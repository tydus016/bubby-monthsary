<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Monthsary Bubby! 💜</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .dancing-script {
            font-family: 'Dancing Script', cursive;
        }

        .playfair {
            font-family: 'Playfair Display', serif;
        }

        /* Floating hearts animation */
        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.7;
            }
            50% {
                transform: translateY(-20px) rotate(5deg);
                opacity: 1;
            }
        }

        .floating-heart {
            animation: float 3s ease-in-out infinite;
        }

        /* Keypad button animation */
        @keyframes press {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(0.95); }
        }

        .key-press {
            animation: press 0.2s ease;
        }

        /* Dancing panda animation */
        @keyframes dance {
            0%, 100% { transform: translateY(0) rotate(-5deg); }
            25% { transform: translateY(-10px) rotate(5deg); }
            50% { transform: translateY(0) rotate(-5deg); }
            75% { transform: translateY(-10px) rotate(5deg); }
        }

        .dancing {
            animation: dance 0.5s ease-in-out infinite;
        }

        /* Heart shape for collage */
        .heart-container {
            position: relative;
            width: 100%;
            max-width: 900px;
            margin: 0 auto;
        }

        .heart-grid {
            display: grid;
            grid-template-columns: repeat(13, 1fr);
            gap: 8px;
            padding: 20px;
            justify-items: center;
            align-items: center;
        }

        .heart-cell {
            width: 100%;
            aspect-ratio: 1;
        }

        .heart-cell.empty-cell {
            visibility: hidden;
        }

        .heart-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            will-change: transform;
        }

        .heart-image:hover {
            transform: scale(1.1);
            z-index: 10;
            box-shadow: 0 8px 16px rgba(0,0,0,0.3);
        }

        /* Gallery styles */
        .gallery-overlay {
            background: rgba(0, 0, 0, 0.95);
            transition: opacity 0.2s ease;
            will-change: opacity;
        }

        .gallery-overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .gallery-img {
            max-width: 90vw;
            max-height: 80vh;
            object-fit: contain;
            transition: opacity 0.15s ease;
            will-change: opacity;
        }

        /* Pulse animation for password display */
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .pulse {
            animation: pulse 0.5s ease-in-out;
        }

        /* Mobile responsive adjustments */
        @media (max-width: 768px) {
            .heart-grid {
                grid-template-columns: repeat(11, 1fr);
                gap: 5px;
                padding: 15px;
            }
            .heart-container {
                max-width: 600px;
            }
        }

        @media (max-width: 480px) {
            .heart-grid {
                grid-template-columns: repeat(9, 1fr);
                gap: 4px;
                padding: 10px;
            }
            .heart-container {
                max-width: 400px;
            }
        }

        /* Hide scrollbar but keep functionality */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 4px;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">
    
    <!-- Floating hearts background decoration -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden">
        <div class="floating-heart absolute top-10 left-10 text-pink-300 text-4xl opacity-30">💜</div>
        <div class="floating-heart absolute top-20 right-20 text-pink-400 text-3xl opacity-30" style="animation-delay: 0.5s;">💖</div>
        <div class="floating-heart absolute bottom-20 left-1/4 text-purple-300 text-5xl opacity-30" style="animation-delay: 1s;">💜</div>
        <div class="floating-heart absolute bottom-10 right-1/3 text-pink-300 text-4xl opacity-30" style="animation-delay: 1.5s;">💗</div>
        <div class="floating-heart absolute top-1/3 right-10 text-purple-400 text-3xl opacity-30" style="animation-delay: 2s;">💜</div>
    </div>

    <!-- Password Screen -->
    <div id="passwordScreen" class="w-full max-w-md relative z-10">
        <div class="bg-white/10 backdrop-blur-lg rounded-3xl shadow-2xl p-8 border border-white/20">
            <!-- Title -->
            <h1 class="dancing-script text-6xl md:text-7xl text-center text-white mb-8 drop-shadow-lg">
                Bubby!!
            </h1>
            
            <!-- Password display -->
            <div class="bg-purple-900/50 rounded-2xl p-6 mb-6 min-h-[80px] flex items-center justify-center">
                <div id="passwordDisplay" class="text-4xl text-white tracking-widest font-mono"></div>
            </div>

            <!-- Error message -->
            <div id="errorMessage" class="text-red-300 text-center mb-4 h-6 text-sm font-semibold"></div>

            <!-- Sad Panda (shown during cooldown) -->
            <div id="sadPanda" class="hidden mb-6">
                <div class="text-center">
                    <div class="text-8xl mb-4">🐼</div>
                    <p class="text-white text-lg mb-2">Sad Panda is sad...</p>
                    <p class="text-purple-200 text-sm">Please wait for:</p>
                    <div id="cooldownTimer" class="text-white text-4xl font-bold mt-2"></div>
                </div>
            </div>

            <!-- Keypad -->
            <div id="keypad" class="grid grid-cols-3 gap-4 mb-6">
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="1">1</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="2">2</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="3">3</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="4">4</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="5">5</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="6">6</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="7">7</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="8">8</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="9">9</button>
                <button id="clearBtn" class="bg-gradient-to-br from-red-500 to-red-600 hover:from-red-600 hover:to-red-700 text-white text-xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95">Clear</button>
                <button class="keypad-btn bg-gradient-to-br from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white text-2xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95" data-num="0">0</button>
                <button id="enterBtn" class="bg-gradient-to-br from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white text-xl font-bold rounded-2xl h-16 transition-all shadow-lg hover:shadow-xl active:scale-95">Enter</button>
            </div>
        </div>
    </div>

    <!-- Happy Panda Transition Screen -->
    <div id="happyPandaScreen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-gradient-to-br from-purple-600 via-pink-500 to-purple-700">
        <div class="text-center">
            <div class="dancing text-9xl mb-6">🐼</div>
            <h2 class="dancing-script text-5xl md:text-7xl text-white mb-4">Yay! Correct! 💜</h2>
            <p class="text-white text-2xl">Loading your surprise...</p>
        </div>
    </div>

    <!-- Collage Screen -->
    <div id="collageScreen" class="hidden w-full min-h-screen py-8 px-4">
        <div class="max-w-7xl mx-auto">
            <!-- Header -->
            <h1 class="dancing-script text-5xl md:text-7xl text-center text-white mb-8 drop-shadow-lg">
                💜 Happy Monthsary Bwabii! 💜
            </h1>
            <p class="text-center text-white/90 text-lg mb-8 playfair">
                Click on any photo to view it larger!
            </p>
            
            <!-- Heart-shaped image collage -->
            <div class="heart-container">
                <div id="heartGrid" class="heart-grid"></div>
            </div>
        </div>
    </div>

    <!-- Gallery Modal -->
    <div id="galleryModal" class="hidden fixed inset-0 z-50 gallery-overlay flex items-center justify-center">
        <button id="closeGallery" class="absolute top-4 right-4 text-white text-4xl hover:text-pink-300 transition-colors z-50 bg-black/50 rounded-full w-14 h-14 flex items-center justify-center">
            ×
        </button>
        
        <h2 class="dancing-script absolute top-8 left-1/2 transform -translate-x-1/2 text-4xl md:text-5xl text-white text-center px-4">
            Happy Monthsary Bubby!!
        </h2>
        
        <button id="prevBtn" class="absolute left-4 text-white text-6xl hover:text-pink-300 transition-colors z-50 bg-black/50 rounded-full w-16 h-16 flex items-center justify-center">
            ‹
        </button>
        
        <div class="flex items-center justify-center w-full h-full p-20">
            <img id="galleryImage" src="" alt="Gallery" class="gallery-img rounded-lg shadow-2xl">
        </div>
        
        <button id="nextBtn" class="absolute right-4 text-white text-6xl hover:text-pink-300 transition-colors z-50 bg-black/50 rounded-full w-16 h-16 flex items-center justify-center">
            ›
        </button>
        
        <div class="absolute bottom-8 left-1/2 transform -translate-x-1/2 text-white text-lg">
            <span id="imageCounter"></span>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
